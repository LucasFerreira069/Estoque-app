<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Estoque</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 360px; }
    .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Controle de Estoque</h1>
    <p>Entre com sua conta para continuar</p>
    <div class="card">
      <div class="campo">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@estoque.com" autofocus>
      </div>
      <div class="campo">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••">
      </div>
      <div id="msg-erro" class="erro" style="display:none"></div>
      <button class="btn btn-primario" id="btn-login" style="width:100%;justify-content:center;margin-top:.5rem">
        Entrar
      </button>
    </div>
  </div>

  <script type="module">
    import '/js/api.js';

    const token = localStorage.getItem('token');
    if (token) window.location.href = '../index.html';

    const btnLogin = document.getElementById('btn-login');
    const msgErro = document.getElementById('msg-erro');

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!email || !senha) {
        msgErro.textContent = 'Preencha email e senha';
        msgErro.style.display = 'block';
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';
      msgErro.style.display = 'none';

      try {
        const data = await api.login(email, senha);
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '../index.html';
      } catch (err) {
        msgErro.textContent = err.message || 'Email ou senha incorretos';
        msgErro.style.display = 'block';
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    btnLogin.addEventListener('click', fazerLogin);
    document.getElementById('senha').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
</body>
</html>
